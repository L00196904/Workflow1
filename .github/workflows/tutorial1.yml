name: tutorial1
on: push

jobs:
  job1:
    name: job1
    runs-on: ubuntu-latest
    steps:
    - name: step1
      run: echo "Hello from job1"
    - name: Echo today's date
      run: date
    - name: setup python
      uses: actions/setup-python@v6
      with:
        python-version: 3.12
    - name: check version of python
      run: python --version
  
  job2: 
    name: job2
    runs-on: windows-latest
    steps:
    - name: step2
      run: echo "Hello from job2"
    - name: Echo today's date
      run: date
  
  job3:
    runs-on: ubuntu-latest
    steps: 
    - name: step3
      run: echo "Hello from job3"
    - name: Echo today's date
      run: date

  job4:
    needs: [job1,job2]
    runs-on: ubuntu-latest
    steps:
    - name: step4
      run: echo "I am job4"  
